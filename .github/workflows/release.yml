name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true

permissions:
  contents: write

jobs:
  create-release:
    name: "Create draft release"
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: "Resolve release tag"
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: echo "tag=${INPUT_TAG:-$REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: "Create draft release"
        env:
          RELEASE_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 \
            || gh release create "$RELEASE_TAG" \
                 --draft \
                 --generate-notes \
                 --title "libunicode ${RELEASE_TAG#v}"

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact_name: unicode-query-linux-x86_64
            binary_path: build/src/tools/unicode-query
            cmake_extra: ""
          - os: macos-14
            artifact_name: unicode-query-macos-arm64
            binary_path: build/src/tools/unicode-query
            cmake_extra: ""
          - os: macos-15-intel
            artifact_name: unicode-query-macos-x86_64
            binary_path: build/src/tools/unicode-query
            cmake_extra: ""
          - os: windows-latest
            artifact_name: unicode-query-windows-x86_64
            binary_path: build/src/tools/unicode-query.exe
            cmake_extra: "-DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded"

    name: "Build ${{ matrix.artifact_name }}"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      - name: "Setup MSVC"
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: "Install Ninja (Linux)"
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: "Install Ninja (macOS)"
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: "Configure"
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DLIBUNICODE_TOOLS=ON
          -DLIBUNICODE_TESTING=OFF
          -DLIBUNICODE_BENCHMARK=OFF
          -DLIBUNICODE_EXAMPLES=OFF
          -DLIBUNICODE_BUILD_STATIC=ON
          -DPEDANTIC_COMPILER=OFF
          ${{ matrix.cmake_extra }}

      - name: "Build"
        run: cmake --build build --target unicode-query

      - name: "Strip binary"
        if: runner.os != 'Windows'
        run: strip ${{ matrix.binary_path }}

      - name: "Verify binary"
        run: ${{ matrix.binary_path }} help

      - name: "Prepare artifact"
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp ${{ matrix.binary_path }} ${{ matrix.artifact_name }}.exe
          else
            cp ${{ matrix.binary_path }} ${{ matrix.artifact_name }}
          fi

      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}*

  release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: "Download all artifacts"
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: "Prepare release assets"
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/
          done

      - name: "Generate checksums"
        working-directory: release
        run: sha256sum unicode-query-* > SHA256SUMS

      - name: "Upload release assets"
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
        run: gh release upload --clobber "$RELEASE_TAG" release/*
